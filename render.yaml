databases:
  - name: signal_fire
    databaseName: signal_fire
    user: signal_fire
    plan: free
    region: virginia

services:
  - type: web
    name: signal-fire
    runtime: ruby
    plan: free
    region: virginia
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails assets:clean
    # preDeployCommand is not supported in the free plan, so migrations run as part of startCommand.
    # In a production environment, we will want to run these commands separately to avoid downtime during deployment.
    # db:prepare (not db:migrate) so the Solid Cache/Cable databases get their
    # schema loaded — those carry a schema file (db/cache_schema.rb) rather than
    # migrations, so db:migrate alone never creates solid_cache_entries and the
    # cache-backed throttle 500s. See Totems::EventSubmissionsController.
    # db:seed deliberately removed (2026-07): seeds are demo/dev data with
    # well-known passwords and must never run against production.
    startCommand: bundle exec rails db:prepare && bundle exec rails server -p $PORT -e $RAILS_ENV
    # Rails' built-in liveness endpoint — cheap, no full page render. /about must
    # also keep resolving (public route contract), but it is not the health check.
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: signal_fire
          property: connectionString
